<!DOCTYPE html>
<!-- Netlify Forms stub: this file exists so Netlify can detect the forms at build time. -->
<!-- The React forms in components/contact-form.tsx and components/lead-form.tsx submit -->
<!-- here via fetch with x-www-form-urlencoded data. -->
<html>
  <body>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="customerType" />
      <input type="text" name="company" />
      <input type="text" name="streetAddress" />
      <input type="text" name="city" />
      <input type="text" name="state" />
      <input type="text" name="zip" />
      <input type="text" name="serviceType" />
      <textarea name="message"></textarea>
      <input type="text" name="smsConsent" />
      <input type="text" name="source" />
    </form>
    <form name="lead" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="customerType" />
      <input type="text" name="company" />
      <input type="text" name="streetAddress" />
      <input type="text" name="city" />
      <input type="text" name="state" />
      <input type="text" name="zip" />
      <input type="text" name="serviceType" />
      <textarea name="message"></textarea>
      <input type="text" name="smsConsent" />
      <input type="text" name="source" />
    </form>
  </body>
</html>
